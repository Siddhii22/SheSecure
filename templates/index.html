<!DOCTYPE html>
<html>
<head>
    <title>SheSecure</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">
    <h1>🛡️ SheSecure</h1>
    <p>AI-Based Women Safety Prediction System</p>

    <form action="/predict" method="post">

        <!-- MODE -->
        <h3>Select Mode</h3>
        <select name="mode" onchange="toggleInputs(this.value)">
            <option value="state">Use State Data</option>
            <option value="manual">Enter Custom Data</option>
        </select>

        <!-- STATE DROPDOWN -->
        <div id="stateDiv">
            <h3>Select State</h3>
            <select name="state">
                {% for s in states %}
                    <option value="{{ s }}">{{ s }}</option>
                {% endfor %}
            </select>
        </div>

        <!-- MANUAL INPUT -->
        <div id="manualDiv" style="display:none;">
            <h3>Enter Crime Data</h3>

            <input type="number" name="rape" placeholder="Rape Cases">
            <input type="number" name="kidnapping" placeholder="Kidnapping Cases">
            <input type="number" name="dowry" placeholder="Dowry Deaths">
            <input type="number" name="assault" placeholder="Assault Cases">
            <input type="number" name="minor" placeholder="Minor Cases">
            <input type="number" name="dv" placeholder="Domestic Violence">
            <input type="number" name="trafficking" placeholder="Trafficking Cases">
        </div>

        <!-- TEXT -->
        <h3>Describe Area Experience</h3>
        <input type="text" name="text" placeholder="e.g. Not safe at night" required>

        <br><br>
        <button type="submit">Predict Safety</button>

    </form>
</div>

<script>
function toggleInputs(mode){
    if(mode === "state"){
        document.getElementById("stateDiv").style.display = "block";
        document.getElementById("manualDiv").style.display = "none";
    } else {
        document.getElementById("stateDiv").style.display = "none";
        document.getElementById("manualDiv").style.display = "block";
    }
}
</script>

</body>
</html>
